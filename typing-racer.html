<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DSA Typing Trainer</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        #stats { margin-bottom: 20px; }
        #targetText { white-space: pre; margin-bottom: 20px; }
        #inputBox { width: 100%; height: 100px; font-size: 18px; }
        #resetBtn { margin-top: 10px; }
        #templateSelector {
            margin-bottom: 20px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="stats">
        <div id="wpm">WPM: 0.0</div>
        <div id="accuracy">Accuracy: 0.0%</div>
        <div id="timer">Time: 0.0s</div>
    </div>
    <div>
        <label for="templateSelector">Select Template:</label>
        <select id="templateSelector">
            <option value="binary_search">Binary Search</option>
            <option value="linear_search">Linear Search</option>
            <option value="factorial">Factorial Recursion</option>
            <option value="bfs">BFS (Graph Traversal)</option>
            <option value="dfs_recursive">DFS (Recursive)</option>
            <option value="dfs_iterative">DFS (Iterative Stack)</option>
        </select>
    </div>
    <pre id="targetText"></pre>
    <textarea id="inputBox" placeholder="Type here..."></textarea>
    <button id="resetBtn">Reset</button>

    <script>
        // Game state
        let gameStarted = false;
        let gameFinished = false;
        let startTime = 0;
        let lastUpdate = 0;

        let typedText = "";
        let targetText = "";

        let totalKeystrokes = 0;
        let errorKeystrokes = 0;

        // Template code snippets
        const templates = {
            "binary_search": "int binarySearch(vector<int>& nums, int target) {\n    int left = 0, right = nums.size() - 1;\n    while (left <= right) {\n        int mid = left + (right - left) / 2;\n        if (nums[mid] == target) return mid;\n        else if (nums[mid] < target) left = mid + 1;\n        else right = mid - 1;\n    }\n    return -1;\n}",
            "linear_search": "int linearSearch(vector<int>& nums, int target) {\n    for (int i = 0; i < nums.size(); i++) {\n        if (nums[i] == target) return i;\n    }\n    return -1;\n}",
            "factorial": "int factorial(int n) {\n    if (n <= 1) return 1;\n    return n * factorial(n - 1);\n}",
            "bfs": "void bfs(int start, vector<vector<int>>& adj, vector<bool>& visited) {\n    queue<int> q;\n    q.push(start);\n    visited[start] = true;\n\n    while (!q.empty()) {\n        int node = q.front();\n        q.pop();\n\n        for (int neighbor : adj[node]) {\n            if (!visited[neighbor]) {\n                visited[neighbor] = true;\n                q.push(neighbor);\n            }\n        }\n    }\n}",
            "dfs_recursive": "void dfs(int node, vector<vector<int>>& adj, vector<bool>& visited) {\n    visited[node] = true;\n\n    for (int neighbor : adj[node]) {\n        if (!visited[neighbor]) {\n            dfs(neighbor, adj, visited);\n        }\n    }\n}",
            "dfs_iterative": "void dfs(int start, vector<vector<int>>& adj, vector<bool>& visited) {\n    stack<int> st;\n    st.push(start);\n\n    while (!st.empty()) {\n        int node = st.top();\n        st.pop();\n\n        if (visited[node]) continue;\n        visited[node] = true;\n\n        for (int neighbor : adj[node]) {\n            if (!visited[neighbor]) {\n                st.push(neighbor);\n            }\n        }\n    }\n}"
        };

        // Initialize game
        const targetElement = document.getElementById('targetText');
        const wpmElement = document.getElementById('wpm');
        const accuracyElement = document.getElementById('accuracy');
        const timerElement = document.getElementById('timer');
        const inputBox = document.getElementById('inputBox');
        const resetBtn = document.getElementById('resetBtn');
        const templateSelector = document.getElementById('templateSelector');

        // Set initial target text
        updateTargetText();

        // Update target text based on selected template
        templateSelector.addEventListener('change', updateTargetText);

        function updateTargetText() {
            const selectedTemplate = templateSelector.value;
            targetText = templates[selectedTemplate];
            targetElement.textContent = targetText;
            typedText = "";
            inputBox.value = "";
            gameStarted = false;
            gameFinished = false;
            startTime = 0;
            lastUpdate = 0;
            totalKeystrokes = 0;
            errorKeystrokes = 0;
            document.querySelector('#stats').style.display = 'none';
        }

        // Start game on first keypress
        inputBox.addEventListener('keydown', (e) => {
            if (!gameStarted) {
                gameStarted = true;
                startTime = performance.now();
                lastUpdate = startTime;
                updateStats();
                document.querySelector('#stats').style.display = 'block';
            }

            // Allow Tab key for indentation
            if (e.key === 'Tab') {
                e.preventDefault();
                typedText += '\t';
                updateStats();
                return;
            }

            // Prevent incorrect characters
            if (e.key === 'Backspace') {
                typedText = typedText.slice(0, -1);
                updateStats();
                return;
            }

            // Only allow correct characters
            if (typedText.length < targetText.length && e.key === targetText[typedText.length]) {
                typedText += e.key;
                updateStats();
            }
        });

        // Update stats every 100ms
        setInterval(() => {
            if (gameStarted && !gameFinished) {
                updateStats();
            }
        }, 100);

        // Check for completion
        function updateStats() {
            if (gameFinished) return;

            // Calculate time
            const now = performance.now();
            const elapsed = (now - startTime) / 1000;
            const timeDisplay = Math.round(elapsed * 10) / 10;

            // Calculate WPM
            const charsTyped = typedText.length;
            const wpm = Math.max(0, (charsTyped / 5) / (elapsed / 60));
            const wpmDisplay = Math.round(wpm * 10) / 10;

            // Calculate accuracy
            let correct = 0;
            let total = 0;
            for (let i = 0; i < Math.min(typedText.length, targetText.length); i++) {
                total++;
                if (typedText[i] === targetText[i]) {
                    correct++;
                } else if (typedText[i] !== '' && targetText[i] !== '') {
                    errorKeystrokes++;
                }
            }
            const accuracy = Math.max(0, Math.min(100, (correct / total) * 100));
            const accuracyDisplay = Math.round(accuracy * 10) / 10;

            // Update UI
            wpmElement.textContent = `WPM: ${wpmDisplay.toFixed(1)}`;
            accuracyElement.textContent = `Accuracy: ${accuracyDisplay.toFixed(1)}%`;
            timerElement.textContent = `Time: ${timeDisplay.toFixed(1)}s`;

            // Check completion
            if (typedText === targetText) {
                gameFinished = true;
                inputBox.disabled = true;
                inputBox.style.backgroundColor = '#e0e0e0';
                sendScore(wpmDisplay, accuracyDisplay, timeDisplay);
            }
        }

        // Reset game
        resetBtn.addEventListener('click', () => {
            if (gameFinished) {
                updateTargetText();
            }
        });

        // Send score to backend
        function sendScore(wpm, accuracy, time) {
            fetch('/api/score', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    wpm: wpm,
                    accuracy: accuracy,
                    time: time
                })
            }).then(() => {
                fetch('/api/leaderboard')
                    .then(res => res.json())
                    .then(data => {
                        // Display leaderboard (you can add this to the page)
                        console.log('Leaderboard:', data);
                    });
            });
        }
    </script>
</body>
</html>
