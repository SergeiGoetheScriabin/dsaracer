<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Typing Racer</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        #stats { margin-bottom: 20px; }
        #targetText { white-space: pre; margin-bottom: 20px; }
        #inputBox { width: 100%; height: 100px; font-size: 18px; }
        #resetBtn { margin-top: 10px; }
    </style>
</head>
<body>
    <div id="stats">
        <div id="wpm">WPM: 0.0</div>
        <div id="accuracy">Accuracy: 0.0%</div>
        <div id="timer">Time: 0.0s</div>
    </div>
    <pre id="targetText"></pre>
    <textarea id="inputBox" placeholder="Type here..."></textarea>
    <button id="resetBtn">Reset</button>

    <script>
        // Game state
        let gameStarted = false;
        let gameFinished = false;
        let startTime = 0;
        let lastUpdate = 0;

        let typedText = "";
        let targetText = "";

        let totalKeystrokes = 0;
        let errorKeystrokes = 0;

        // Initialize game
        const targetElement = document.getElementById('targetText');
        const wpmElement = document.getElementById('wpm');
        const accuracyElement = document.getElementById('accuracy');
        const timerElement = document.getElementById('timer');
        const inputBox = document.getElementById('inputBox');
        const resetBtn = document.getElementById('resetBtn');

        // Set target text (for demo, we'll use a static text)
        targetText = "The quick brown fox jumps over the lazy dog";
        targetElement.textContent = targetText;

        // Start game on first keypress
        inputBox.addEventListener('keydown', (e) => {
            if (!gameStarted) {
                gameStarted = true;
                startTime = performance.now();
                lastUpdate = startTime;
                updateStats();
                document.getElementById('wpm').textContent = "WPM: 0.0";
                document.getElementById('accuracy').textContent = "Accuracy: 0.0%";
                document.getElementById('timer').textContent = "Time: 0.0s";
                document.querySelector('#stats').style.display = 'block';
            }
            typedText += e.key;
            updateStats();
        });

        // Handle backspace
        inputBox.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace') {
                typedText = typedText.slice(0, -1);
                updateStats();
            }
        });

        // Update stats every 100ms
        setInterval(() => {
            if (gameStarted && !gameFinished) {
                updateStats();
            }
        }, 100);

        // Check for completion
        function updateStats() {
            if (gameFinished) return;

            // Calculate time
            const now = performance.now();
            const elapsed = (now - startTime) / 1000;
            const timeDisplay = Math.round(elapsed * 10) / 10;

            // Calculate WPM
            const charsTyped = typedText.length;
            const wpm = Math.max(0, (charsTyped / 5) / (elapsed / 60));
            const wpmDisplay = Math.round(wpm * 10) / 10;

            // Calculate accuracy
            let correct = 0;
            let total = 0;
            for (let i = 0; i < Math.min(typedText.length, targetText.length); i++) {
                total++;
                if (typedText[i] === targetText[i]) {
                    correct++;
                } else if (typedText[i] !== '' && targetText[i] !== '') {
                    errorKeystrokes++;
                }
            }
            const accuracy = Math.max(0, Math.min(100, (correct / total) * 100));
            const accuracyDisplay = Math.round(accuracy * 10) / 10;

            // Update UI
            wpmElement.textContent = `WPM: ${wpmDisplay.toFixed(1)}`;
            accuracyElement.textContent = `Accuracy: ${accuracyDisplay.toFixed(1)}%`;
            timerElement.textContent = `Time: ${timeDisplay.toFixed(1)}s`;

            // Check completion
            if (typedText === targetText) {
                gameFinished = true;
                inputBox.disabled = true;
                inputBox.style.backgroundColor = '#e0e0e0';
                sendScore(wpmDisplay, accuracyDisplay, timeDisplay);
            }
        }

        // Reset game
        resetBtn.addEventListener('click', () => {
            if (gameFinished) {
                gameStarted = false;
                gameFinished = false;
                startTime = 0;
                typedText = "";
                totalKeystrokes = 0;
                errorKeystrokes = 0;
                inputBox.value = "";
                inputBox.disabled = false;
                inputBox.style.backgroundColor = '#ffffff';
                document.querySelector('#stats').style.display = 'none';
                targetElement.textContent = targetText;
            }
        });

        // Send score to backend
        function sendScore(wpm, accuracy, time) {
            fetch('/api/score', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    wpm: wpm,
                    accuracy: accuracy,
                    time: time
                })
            }).then(() => {
                fetch('/api/leaderboard')
                    .then(res => res.json())
                    .then(data => {
                        // Display leaderboard (you can add this to the page)
                        console.log('Leaderboard:', data);
                    });
            });
        }
    </script>
</body>
</html>
